name: Generate profile metrics

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/metrics.yml
      - scripts/generate-profile-metrics.mjs

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Check out profile repository
        uses: actions/checkout@v4

      - name: Generate profile and language metrics
        env:
          GITHUB_TOKEN: ${{ github.token }}
          METRICS_USER: xiayu519
        run: node scripts/generate-profile-metrics.mjs

      - name: Commit profile and language metrics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add github-metrics-left.svg
          if git diff --cached --quiet; then
            echo "Profile metrics are unchanged"
          else
            git commit -m "chore: update profile metrics"
            git push
          fi

      - name: Generate contribution calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          user: xiayu519
          filename: github-metrics-right.svg
          committer_branch: main
          template: classic
          base: ""
          config_timezone: Asia/Shanghai
          config_padding: 0, 8 + 11%
          config_order: isocalendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
