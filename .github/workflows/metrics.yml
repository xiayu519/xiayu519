name: Generate profile metrics

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/metrics.yml

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate profile and language metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          user: xiayu519
          filename: github-metrics-left.svg
          committer_branch: main
          template: classic
          base: header, activity, community
          config_timezone: Asia/Shanghai
          config_padding: 0, 8 + 11%
          config_order: base.header, base.activity+community, languages
          plugin_languages: yes
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_ignored: html, css
          plugin_languages_details: percentage
          plugin_languages_indepth: no

      - name: Generate contribution calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          user: xiayu519
          filename: github-metrics-right.svg
          committer_branch: main
          template: classic
          base: ""
          config_timezone: Asia/Shanghai
          config_padding: 0, 8 + 11%
          config_order: isocalendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
